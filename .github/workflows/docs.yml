name: CI/CD Documentation Builder

on:
  push:
    branches:
      - main
      - production

jobs:
  build-and-deploy-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pdoc ultralytics opencv-python pillow

      - name: Generate API Docs
        run: |
          pdoc main.py -o docs/api

      - name: Add Multilingual Support (i18n)
        run: |
          for file in docs/api/*.html; do
            sed -i 's|</body>|<div id="google_translate_element" style="position:fixed;bottom:20px;right:20px;z-index:9999;background:white;padding:10px;border-radius:8px;box-shadow:0 0 10px rgba(0,0,0,0.1);"></div><script type="text/javascript">function googleTranslateElementInit() {new google.translate.TranslateElement({pageLanguage: "uk"}, "google_translate_element");}</script><script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script></body>|' "$file" || true
          done

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions CI/CD"
          git add docs/api/
          git commit -m "docs: auto-generate multilingual documentation [skip ci]" || echo "No changes to commit"
          git push